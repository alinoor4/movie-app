{% extends "base.html" %}
{% block content %}


<table class="table table-bordered table-hovered">
    <thead>
        <tr>
            <th>Title</th>
            <th>Genre</th>
            <th>Stock</th>
            <th>Daily Rate</th>
        </tr>
    </thead>
    <tbody>
        {% for movie in movies %}
        <tr>
            <td>
                <a href="{% url 'movies:detail' movie.id%}"> {{movie.name}}</a>
            </td>
            <td>{{movie.genre}}</td>
            <td>{{movie.stockAmount}}</td>
            <td>{{movie.price}}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
